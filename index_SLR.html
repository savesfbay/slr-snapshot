<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Bay Area Sea Level Rise & Flood Preparedness</title>
<meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<link href="SLR_map_popup.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.18.1/mapbox-gl.js"></script> 
<style>
      body { 
        margin: 0; 
        padding: 0; 
      }
      #map { 
        position: absolute; 
        top: 0; 
        bottom: 0; 
        width: 100%; 
      }
    </style>
</head>
<body>
<div id="map"></div>
<script>
    mapboxgl.accessToken = 'pk.eyJ1Ijoic2F2ZXNmYmF5IiwiYSI6ImNra3JnamVwOTNkcW0zMnBkZDlxOXJjdmEifQ.XN_nfl_JbmkIyACF2wNX6Q';
    const map = new mapboxgl.Map({
        container: 'map',
        // Choose from Mapbox's core styles, or make your own style with Mapbox Studio
        style: 'mapbox://styles/savesfbay/cmj68iadl00dn01sl0hus3kem',
        center: [-122.179, 37.750],
        zoom: 8.83
    });
    const citySnapshotsLayerId = 'slr-city-snapshots';

    map.on('load', () => {
      map.addSource('slr-city-snapshots-source', {
        type: 'geojson',
        data: 'SLR_city-snapshots.geojson'
      });

      map.loadImage('map-pin-1.png', (error, image) => {
        if (error) throw error;
        if (!map.hasImage('city-pin')) {
          map.addImage('city-pin', image);
        }

        map.addLayer({
          id: citySnapshotsLayerId,
          type: 'symbol',
          source: 'slr-city-snapshots-source',
          layout: {
            'icon-image': 'city-pin',
            'icon-size': 0.28,
            'icon-anchor': 'bottom',
            'icon-allow-overlap': true,
            'text-field': ['get', 'title'],
            'text-font': ['Open Sans Semibold', 'Arial Unicode MS Bold'],
            'text-size': 13,
            'text-offset': [0.9, -1.2],
            'text-anchor': 'left',
            'text-optional': false
          },
          paint: {
            'text-color': '#0f172a',
            'text-halo-color': '#ffffff',
            'text-halo-width': 1.25
          }
        });
      });
    });
    /* 
    Add an event listener that runs
    when a user clicks on the map element.
    */
    map.on('click', (event) => {
      // If the user clicked on one of your markers, get its information.
      const features = map.queryRenderedFeatures(event.point, {
        layers: [citySnapshotsLayerId]
      });
      if (!features.length) {
        return;
      }
      const feature = features[0];

      /* 
      Create a popup, specify its options 
      and properties, and add it to the map.
      */
      const popup = new mapboxgl.Popup({ offset: [0, -15], maxWidth: '520px' })
        .setLngLat(feature.geometry.coordinates)
        .setHTML(
          `<h1>${feature.properties.title}</h1><p style="float:right;"><a href="${feature.properties.link}" target="_blank">Full Snapshot →</a></p><h2>At a Glance</h2><p>${feature.properties.description}</p><p><a href="${feature.properties.link}" target="_blank">Download our full evaluation of ${feature.properties.title}.</a></p>`
        )
        .addTo(map);
      });

    </script>
  </body>
</html>
